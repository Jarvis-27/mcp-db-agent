services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the DATABASE_URL from .env so the server reaches the 'db'
      # container by its service name rather than localhost
      DATABASE_URL: postgresql://admin:secret@db:5432/ecommerce
      TRANSPORT: streamable-http
    depends_on:
      db:
        condition: service_healthy
